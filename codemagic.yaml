workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        # Qui l'utente potrà aggiungere i gruppi di variabili per i certificati Apple
        - app_store_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
    scripts:
      - name: Check branch
        script: |
          if [ "$CM_BRANCH" != "main" ]; then
            echo "Not on main branch ($CM_BRANCH), skipping build."
            exit 0
          fi
      - name: Install dependencies
        script: npm install
      - name: Build web project
        script: |
          chmod +x node_modules/.bin/*
          npm run build
      - name: Capacitor Sync
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
      - name: Verify iOS Compilation (No Signing)
        script: |
          # Questo comando verifica che il codice sia corretto e compili su iOS, 
          # ma non richiede i certificati Apple. OTTIMO per i test iniziali!
          xcodebuild build \
            -workspace "ios/App/App.xcworkspace" \
            -scheme "App" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Build Production IPA (Requires Code Signing)
        script: |
          # ATTENZIONE: Questo comando fallirà finché non configuri i certificati 
          # in Codemagic (Settings > iOS Code Signing). 
          # Se non li hai ancora, puoi ignorare l'errore in questo step per ora.
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - peakswimservice@gmail.com
