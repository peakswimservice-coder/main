workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        # Qui l'utente potrà aggiungere i gruppi di variabili per i certificati Apple
        - app_store_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
    scripts:
      - name: Check branch
        script: |
          if [ "$CM_BRANCH" != "main" ]; then
            echo "Not on main branch ($CM_BRANCH), skipping build."
            exit 0
          fi
      - name: Install dependencies
        script: npm install
      - name: Build web project
        script: |
          chmod +x node_modules/.bin/*
          npm run build
      - name: Capacitor Sync
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
      - name: Generate Unsigned IPA for Sideloading
        script: |
          # 1. Compila l'app senza firma
          xcodebuild build \
            -workspace "ios/App/App.xcworkspace" \
            -scheme "App" \
            -sdk iphoneos \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            clean build

          # 2. Crea il pacchetto .ipa manualmente (Payload folder)
          # Cerchiamo dove Xcode ha messo il file .app (di solito in DerivedData)
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d | head -n 1)
          if [ -d "$APP_PATH" ]; then
            mkdir -p build/ios/ipa/Payload
            cp -r "$APP_PATH" build/ios/ipa/Payload/
            cd build/ios/ipa
            zip -qr PeakSwim-unsigned.ipa Payload
            echo "IPA non firmato generato con successo!"
          else
            echo "Errore: Non ho trovato il file App.app compilato."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - peakswimservice@gmail.com
