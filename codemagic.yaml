workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        # Qui l'utente potrà aggiungere i gruppi di variabili per i certificati Apple
        - app_store_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
    scripts:
      - name: Check branch
        script: |
          if [ "$CM_BRANCH" != "main" ]; then
            echo "Not on main branch ($CM_BRANCH), skipping build."
            exit 0
          fi
      - name: Install dependencies
        script: npm install
      - name: Build web project
        script: |
          chmod +x node_modules/.bin/*
          npm run build
      - name: Capacitor Sync
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
      - name: Build iOS project
        script: |
          # Questa parte richiede che la cartella 'ios' sia stata generata e pushata, 
          # oppure generata qui con 'npx cap add ios'
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - peakswimservice@gmail.com
